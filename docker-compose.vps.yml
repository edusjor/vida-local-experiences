services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3009
      RUN_DB_GENERATE: "true"
      RUN_DB_MIGRATIONS: "true"
      RUN_DB_PUSH: "false"
    ports:
      - "8495:3009"
    volumes:
      - ./uploads:/app/uploads
